name: focused-hardening

on:
  pull_request:
    branches: [main]

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
      - run: composer install --quiet --no-interaction --prefer-dist --optimize-autoloader
      - run: cp .env.example .env && php artisan key:generate --quiet
      - name: Dashboard hardening tests
        run: ./vendor/bin/pest tests/Feature/Performance/DashboardAnalyticsHardeningTest.php --compact
      - name: Effective-date tests
        run: ./vendor/bin/pest tests/Feature/Settings/CompanyDocumentEffectiveDatesTest.php --compact
      - name: Asset replacement tests
        run: ./vendor/bin/pest tests/Feature/Organization/CompanyAssetReplacementSafetyTest.php --compact
